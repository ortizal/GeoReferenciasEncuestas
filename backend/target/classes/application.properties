server.port=8080
server.servlet.context-path=/api

spring.application.name=geo-referencias-backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/georeferencias_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA + PostGIS
# Hibernate auto-detecta PostGIS dialect gracias a hibernate-spatial en classpath
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT
jwt.secret=mySecretKeyForJwtTokenGenerationGeoreferencias2024SecureEnough
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.header=Authorization
jwt.prefix=Bearer

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cache
spring.cache.type=caffeine

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.georeferencias=INFO
logging.level.org.hibernate.SQL=WARN
