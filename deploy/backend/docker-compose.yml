version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: georeferencias_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: georeferencias_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend/Dockerfile
    container_name: geo-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/georeferencias_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-12345}
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForJwtTokenGenerationGeoreferencias2024SecureEnough}
    ports:
      - "8080:8080"

volumes:
  pgdata:
