name: georeferencias_mobile
description: "ALANTEK GeoReferencias - App móvil para visitadores"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.3.0

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Utils
  intl: ^0.19.0
  flutter_svg: ^2.0.17
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # UI
  flutter_screenutil: ^5.9.3
  badges: ^3.1.2
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
